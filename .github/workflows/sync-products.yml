name: Sync Supplier Catalog

on:
  schedule:
    # Every Monday and Thursday at 03:00 UAE time (23:00 UTC prev day)
    - cron: '0 23 * * 0,3'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run catalog sync
        run: node scripts/sync-supplier-catalog.js

      - name: Download new product images
        run: node scripts/download-product-images.js

      - name: Regenerate Meta/Google product feed
        run: node scripts/generate-product-feed.js

      - name: Commit updated catalog
        run: |
          git config user.name "akm-catalog-bot"
          git config user.email "sales@akm-music.com"
          git add products.json assets/products products-feed.csv
          if git diff --cached --quiet; then
            echo "No catalog changes."
          else
            git commit -m "chore: refresh product catalog (prices, stock & images)"
            git push
          fi
